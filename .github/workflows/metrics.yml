name: GitHub Metrics

on:
  # Run every day at midnight UTC
  schedule:
    - cron: "0 0 * * 0"
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-stats.svg
          base: header, activity, community, repositories
          plugin_topics: yes
          plugin_topics_mode: labels  # icons
          plugin_topics_limit: 15
          plugin_topics_sort: stars
          config_timezone: Australia/Sydney

      - name: Generate Sponsors Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-sponsors.svg
          base: ""
          plugin_sponsors: yes
          plugin_sponsors_sections: goal, list, about
          config_timezone: Australia/Sydney

      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          config_timezone: Australia/Sydney

      - name: Generate WakaTime Card
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: assets/metrics-wakatime.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_days: 7    # options: 7, 30, 180, 365
          plugin_wakatime_limit: 5
          config_timezone: Australia/Sydney

      - name: Generate Achievements Card
        uses: lowlighter/metrics@3.34.0
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_ignored: manager
          config_timezone: Australia/Sydney
